<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Samaín La Cormelana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #2d2b72, #23235b);
            color: white;
            min-height: 100vh;
            padding: 25px 15px;
        }
        .contenedor-principal {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            color: #333;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
        }
        .header-carta {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #2d2b72;
            padding-bottom: 15px;
        }
        .header-carta h1 {
            color: #2d2b72;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .header-carta p {
            color: #666;
            font-style: italic;
        }
        /* Estilos para las secciones dinámicas */
        .categoria-titulo {
            color: #2d2b72;
            font-size: 22px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
            margin-top: 25px;
            margin-bottom: 10px;
        }
        /* Enlaces a alérgenos y PDF */
        .enlaces-aux {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        .enlaces-aux a {
            color: #2d2b72;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        
        <header class="header-carta">
            <h1>Samaín</h1>
            <p>- Iberian Specialists -</p>
        </header>

        <!-- THE ENGINE AUTOMATICALLY INJECTS THE MENU AND ALLERGENS HERE -->
        <div id="contenedor-carta"></div>

        <footer class="enlaces-aux">
            <a href="alergenos-en.png" target="_blank">📋 View Allergen Chart</a>
            <a href="carta_en.pdf" target="_blank">📥 Download PDF</a>
        </footer>

    </div>

    <!-- CRITICAL LOADING ORDER: First data, then the engine -->
    <script src="menu-en.js"></script>
    <script src="script.js"></script>
    <script src="destino.js"></script>

</body>
</html>
