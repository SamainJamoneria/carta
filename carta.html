<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Carta - Samaín La Cormelana</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{

scroll-behavior:smooth;

}

body{

font-family:Arial,Helvetica,sans-serif;
background:#f2f2f2;
color:#333;

}

header{

background:linear-gradient(180deg,#2d2b72,#23235b);

padding:20px 20px 35px;

text-align:center;

color:white;

}

header img{

width:170px;

max-width:80%;

margin-bottom:10px;

}

header h1{

font-size:30px;

margin:8px 0;

font-weight:700;

}

header p{

color:#ddd;
margin-top:8px;

}

<div class="menu-categorias">

<a href="#tostas">🥖 Tostas</a>

<a href="#tablas">🧀 Tablas</a>

<a href="#raciones">🍖 Raciones</a>

<a href="#ensaladas">🥗 Ensaladas</a>

<a href="#quesos">🧀 Quesos</a>

<a href="#piadinas">🌯 Piadinas</a>

<a href="#bocadillos">🥪 Bocadillos</a>

<a href="#postres">🍰 Postres</a>

</div>
  
main{

max-width:900px;
margin:auto;
padding:25px;

}

.seccion{

background:white;
margin-bottom:25px;
border-radius:15px;
padding:25px;
box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.seccion h2{

color:#2d2b72;
margin-bottom:20px;

}

.producto{

background:#fafafa;

padding:18px;

margin:15px 0;

border-radius:12px;

box-shadow:0 4px 12px rgba(0,0,0,.05);

transition:.25s;

}

.producto:hover{

transform:translateY(-2px);

box-shadow:0 8px 20px rgba(0,0,0,.10);

}

.producto:last-child{

border:none;

}

.nombre{

font-size:20px;

font-weight:bold;

color:#2d2b72;

margin-bottom:8px;

}

.descripcion{

color:#666;

font-size:15px;

margin-top:8px;

line-height:1.5;

}

.precio{

margin-top:15px;

font-size:22px;

font-weight:bold;

text-align:right;

color:#2d2b72;

}

footer{

padding:40px;
text-align:center;
color:#666;

}

summary{

font-size:26px;

font-weight:bold;

color:#2d2b72;

cursor:pointer;

list-style:none;

padding-bottom:15px;

}

summary::-webkit-details-marker{

display:none;

}

details{

transition:.3s;

}

nav{

position:sticky;

top:0;

background:#ffffff;

display:flex;

justify-content:space-between;

align-items:center;

padding:12px 20px;

box-shadow:0 2px 12px rgba(0,0,0,.12);

z-index:999;

}

nav a{

text-decoration:none;

font-weight:bold;

color:#2d2b72;

font-size:18px;

}

.idiomas{

display:flex;

gap:15px;

}  

.menu-categorias{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:12px;

padding:20px;

max-width:900px;

margin:auto;

}

.menu-categorias a{

background:white;

padding:15px;

border-radius:12px;

text-decoration:none;

text-align:center;

font-weight:bold;

color:#2d2b72;

box-shadow:0 3px 10px rgba(0,0,0,.08);

transition:.25s;

}

.menu-categorias a:hover{

transform:translateY(-2px);

box-shadow:0 8px 18px rgba(0,0,0,.15);

}  
  
</style>

</head>

<body>

<header>

<nav>

<a href="index.html">🏠 Inicio</a>

<div class="idiomas">

<a href="carta.html">🇪🇸</a>

<a href="#">🇬🇧</a>

</div>

</nav>
  
<img src="LOGO.png">

<h1>Carta</h1>

<p>Especialistas en Ibérico</p>

</header>

<main>

<details class="seccion" open>

<summary>🥖 Tostas Premium</summary>

<div class="producto">

<div class="nombre">
Burrata con polvo de jamón ibérico
</div>

<div class="descripcion">
Burrata cremosa acompañada de polvo de jamón ibérico.
</div>

<div class="precio">
12,50 €
</div>

</div>

<div class="producto">

<div class="nombre">
Tosta de Cecina
</div>

<div class="precio">
12,00 €
</div>

</div>

</details>

<details class="seccion">

<summary>🧀 Tablas</summary>

<div class="producto">

</div>

<div class="producto">

</div>

</details>

</main>

<footer>

</footer>

</body>
</html>
