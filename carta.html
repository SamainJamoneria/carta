<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta - Samaín La Cormelana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #2d2b72, #23235b);
            color: white;
            min-height: 100vh;
            padding: 25px 15px;
        }
        .contenedor-principal {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            color: #333;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
        }
        .header-carta {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #2d2b72;
            padding-bottom: 15px;
        }
        .header-carta h1 {
            color: #2d2b72;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .header-carta p {
            color: #666;
            font-style: italic;
        }

        /* Zona de enlaces abajo */
        .enlaces-aux {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        .enlaces-aux a, .enlaces-aux button {
            color: #2d2b72;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        /* Ventana emergente (Modal) que atenúa la aplicación */
        .modal-alergenos {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85); /* Atenúa el fondo en oscuro */
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
            cursor: pointer; /* Indica que al hacer clic se cierra */
        }
        .modal-alergenos.activo {
            display: flex; /* Se muestra al pulsar */
        }
        .modal-contenido {
            max-width: 95%;
            max-height: 95%;
            overflow-y: auto;
        }
        .modal-contenido img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        
        <header class="header-carta">
            <h1>Samaín</h1>
            <p>- Especialistas en Ibérico -</p>
        </header>

        <!-- PEGA AQUÍ TU LISTA ORIGINAL DE PLATOS ESCRITA A MANO -->
        <div class="tu-contenido-de-la-carta">
            <!-- Tus h2, párrafos y precios estáticos tal y como los tenías -->
        </div>

        <footer class="enlaces-aux">
            <!-- Al tocar aquí se activa el mensaje emergente atenuado -->
            <button id="btn-alergenos">📋 Ver Tabla de Alérgenos</button>
            <a href="carta.pdf" target="_blank">📥 Descargar PDF</a>
        </footer>

    </div>

    <!-- Mensaje emergente de la imagen (Cierra al hacer clic en cualquier parte) -->
    <div id="modal-foto" class="modal-alergenos">
        <div class="modal-contenido">
            <img src="alergenos.jpg" alt="Tabla de Alérgenos">
        </div>
    </div>

    <script>
        const btnAbrir = document.getElementById('btn-alergenos');
        const modalFoto = document.getElementById('modal-foto');

        // Al tocar el botón, se abre atenuando la aplicación
        btnAbrir.addEventListener('click', () => {
            modalFoto.classList.add('activo');
        });

        // Al hacer clic en cualquier parte del fondo o de la imagen, desaparece por completo
        modalFoto.addEventListener('click', () => {
            modalFoto.classList.remove('activo');
        });
    </script>

</body>
</html>
