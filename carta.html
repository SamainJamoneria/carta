<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta - Samaín La Cormelana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #2d2b72, #23235b);
            color: white;
            min-height: 100vh;
            padding: 25px 15px;
        }
        .contenedor-principal {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            color: #333;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
        }
        .header-carta {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #2d2b72;
            padding-bottom: 15px;
        }
        .header-carta h1 {
            color: #2d2b72;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .header-carta p {
            color: #666;
            font-style: italic;
        }

        /* Zona de enlaces abajo */
        .enlaces-aux {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        .enlaces-aux a, .enlaces-aux button {
            color: #2d2b72;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        /* Ventana del aviso de alérgenos */
        .modal-alergenos {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }
        .modal-alergenos.activo {
            display: flex;
        }
        .modal-contenido {
            background: white;
            padding: 20px;
            border-radius: 15px;
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
            text-align: center;
            position: relative;
        }
        .modal-contenido img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
        .btn-cerrar {
            margin-top: 15px;
            background: #2d2b72;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        
        <header class="header-carta">
            <h1>Samaín</h1>
            <p>- Especialistas en Ibérico -</p>
        </header>

        <!-- AQUÍ VA TU LISTA DE PLATOS ESCRITA A MANO COMO LA TENÍAS ANTES -->
        <div class="tu-contenido-de-la-carta">
            <!-- Pega aquí tus secciones de platos si las tienes guardadas -->
        </div>

        <footer class="enlaces-aux">
            <!-- Al pinchar aquí, saltará el aviso en la pantalla -->
            <button id="btn-alergenos">📋 Ver Tabla de Alérgenos</button>
            <a href="carta.pdf" target="_blank">📥 Descargar PDF</a>
        </footer>

    </div>

    <!-- El aviso oculto que se abrirá al pulsar -->
    <div id="mi-modal" class="modal-alergenos">
        <div class="modal-contenido">
            <img src="alergenos.jpg" alt="Tabla de Alérgenos">
            <br>
            <button class="btn-cerrar" id="btn-cerrar-modal">Cerrar Aviso</button>
        </div>
    </div>

    <script>
        // Lógica simple para abrir y cerrar el aviso de alérgenos
        const btnAbrir = document.getElementById('btn-alergenos');
        const btnCerrar = document.getElementById('btn-cerrar-modal');
        const modal = document.getElementById('mi-modal');

        btnAbrir.addEventListener('click', () => {
            modal.classList.add('activo');
        });

        btnCerrar.addEventListener('click', () => {
            modal.classList.remove('activo');
        });

        // Cerrar también si pinchan fuera de la foto
        modal.addEventListener('click', (e) => {
            if(e.target === modal) {
                modal.classList.remove('activo');
            }
        });
    </script>

</body>
</html>
