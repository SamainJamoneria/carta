<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Carta - Samaín La Cormelana</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,Helvetica,sans-serif;
background:#f2f2f2;
color:#333;

}

header{

background:#2d2b72;
padding:30px;
text-align:center;

}

header img{

width:220px;
max-width:90%;

}

header h1{

color:white;
margin-top:20px;
font-size:34px;

}

header p{

color:#ddd;
margin-top:8px;

}

main{

max-width:900px;
margin:auto;
padding:25px;

}

.seccion{

background:white;
margin-bottom:25px;
border-radius:15px;
padding:25px;
box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.seccion h2{

color:#2d2b72;
margin-bottom:20px;

}

.producto{

display:flex;
justify-content:space-between;
align-items:center;

padding:12px 0;

border-bottom:1px solid #ececec;

}

.producto:last-child{

border:none;

}

.nombre{

font-weight:bold;

}

.precio{

font-weight:bold;
color:#2d2b72;

}

footer{

padding:40px;
text-align:center;
color:#666;

}

summary{

font-size:26px;

font-weight:bold;

color:#2d2b72;

cursor:pointer;

list-style:none;

padding-bottom:15px;

}

summary::-webkit-details-marker{

display:none;

}

details{

transition:.3s;

}

</style>

</head>

<body>

<header>

<img src="LOGO.png">

<h1>Carta</h1>

<p>Especialistas en Ibérico</p>

</header>

<main>

<details class="seccion" open>

<summary>🥖 Tostas Premium</summary>

<div class="producto">

<div class="nombre">
Burrata con polvo de jamón ibérico
</div>

<div class="precio">
12,50 €
</div>

</div>

<div class="producto">

<div class="nombre">
Tosta de Cecina
</div>

<div class="precio">
12,00 €
</div>

</div>

</details>

<details class="seccion">

<summary>🧀 Tablas</summary>

<div class="producto">

<div class="nombre">
Tabla Ibérica
</div>

<div class="precio">
18,00 €
</div>

</div>

<div class="producto">

<div class="nombre">
Tabla de Quesos
</div>

<div class="precio">
16,00 €
</div>

</div>

</details>

</main>

<footer>

Samaín La Cormelana · A Coruña

</footer>

</body>
</html>
